logging:
  level:
    ROOT: INFO
    com.sport.ecommerce: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sport_ecommerce?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      connection-timeout: 300000
      maximum-pool-size: 20
      max-lifetime: 7200000
      pool-name: spring-boot-hikari-mysql-cp

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

  elasticsearch:
    uris: http://localhost:9200

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

jwt:
  secret: ${JWT_SECRET:sport-ecommerce-dev-secret-change-in-production-min32chars}
  expiration: 900000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
