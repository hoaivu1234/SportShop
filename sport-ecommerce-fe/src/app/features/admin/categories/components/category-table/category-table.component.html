<div class="table-wrapper">
  <table class="category-table">
    <thead>
      <tr>
        <th>Category</th>
        <th>Products</th>
        <th>Slug</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (cat of categories(); track cat.id) {
        <tr>
          <td>
            <div class="cat-name">
              <i class="fas fa-tag cat-icon"></i>
              {{ cat.name }}
            </div>
          </td>
          <td class="product-count">{{ cat.productCount }}</td>
          <td>
            <span class="slug-code">/{{ cat.slug }}</span>
          </td>
          <td>
            <div class="action-btns">
              <button class="action-btn edit-btn" (click)="openModal(cat)">
                Edit
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
  <!-- Modal -->
  @if (showModal) {
    <app-category-form
      [mode]="mode"
      [category]="selectedCategory"
      (saved)="onSaved()"
      (close)="closeModal()"
    ></app-category-form>
  }
</div>

<app-pagination
  [currentPage]="pagination().page"
  [pageSize]="pagination().size"
  [totalElements]="totalElements()"
  (pageChange)="onPageChange($event)"
/>
