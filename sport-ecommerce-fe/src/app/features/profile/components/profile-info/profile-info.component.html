<div class="profile-info">
  <div class="content-header">
    <h2 class="content-title">PROFILE SETTINGS</h2>
  </div>

  @if (loading) {
    <div class="loading-state">
      <i class="fas fa-spinner fa-spin"></i> Loading profile...
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSave()" class="settings-form">
    <div class="form-row">
      <div class="form-group">
        <label for="piFirstName">First Name *</label>
        <input
          id="piFirstName"
          type="text"
          formControlName="firstName"
          [class.input--error]="form.get('firstName')?.invalid && form.get('firstName')?.touched"
        />
        @if (form.get('firstName')?.invalid && form.get('firstName')?.touched) {
          <span class="error-msg">Required</span>
        }
      </div>
      <div class="form-group">
        <label for="piLastName">Last Name *</label>
        <input
          id="piLastName"
          type="text"
          formControlName="lastName"
          [class.input--error]="form.get('lastName')?.invalid && form.get('lastName')?.touched"
        />
        @if (form.get('lastName')?.invalid && form.get('lastName')?.touched) {
          <span class="error-msg">Required</span>
        }
      </div>
    </div>

    <div class="form-group">
      <label for="piPhone">Phone Number</label>
      <input id="piPhone" type="tel" formControlName="phone" />
    </div>

    <div class="form-actions">
      <button type="submit" class="save-btn" [disabled]="saving">
        @if (saving) {
          <i class="fas fa-spinner fa-spin"></i> Saving...
        } @else {
          <i class="fas fa-save"></i> Save Changes
        }
      </button>
    </div>
  </form>
</div>
