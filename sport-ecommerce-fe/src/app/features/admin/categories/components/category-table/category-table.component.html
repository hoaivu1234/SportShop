<div class="table-wrapper">
  <table class="category-table">
    <thead>
      <tr>
        <th>Category</th>
        <th>Products</th>
        <th>Slug</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (cat of categories(); track cat.id) {
        <tr>
          <td>
            <div class="cat-name">
              <i class="fas fa-tag cat-icon"></i>
              {{ cat.name }}
            </div>
          </td>
          <td class="product-count">{{ cat.productCount }}</td>
          <td>
            <span class="slug-code">/{{ cat.slug }}</span>
          </td>
          <td>
            <div class="action-btns">
              <button class="action-btn edit-btn" (click)="openModal(cat)">
                Edit
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
  <!-- Modal -->
  @if (showModal) {
    <app-category-form
      [mode]="mode"
      [category]="selectedCategory"
      (close)="closeModal()"
    ></app-category-form>
  }
</div>

<div class="table-footer">
  <span class="showing-text">Showing 5 of 24 categories</span>
  <div class="pagination">
    <button class="page-btn" disabled>
      <i class="fas fa-chevron-left"></i>
    </button>
    <button class="page-num active">1</button>
    <button class="page-num">2</button>
    <button class="page-num">3</button>
    <button class="page-btn">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>
</div>
