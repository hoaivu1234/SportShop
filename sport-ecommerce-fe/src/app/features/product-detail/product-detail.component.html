<div class="product-detail">
  <div class="container">

    @if (isLoading()) {
      <div class="loading-state">
        <i class="fas fa-spinner fa-spin"></i> Loading product…
      </div>
    } @else if (product()) {
      <!-- Main Product Section -->
      <div class="product-detail__main">
        <!-- Left: Images -->
        <div class="product-detail__images">
          <app-product-images [images]="product()!.images" />
        </div>

        <!-- Right: Info -->
        <div class="product-detail__info">
          <app-product-info [product]="product()" />
        </div>
      </div>

      <!-- Description -->
      @if (product()!.description) {
        <section class="product-detail__description">
          <h2 class="description__title">ABOUT THIS PRODUCT</h2>
          <div class="description__content">
            <p>{{ product()!.description }}</p>
          </div>
        </section>
      }
    }

    <!-- Related Products -->
    <app-related-products />

    <!-- Reviews -->
    @if (product()) {
      <app-review-list [productId]="product()!.id" />
    }
  </div>
</div>
