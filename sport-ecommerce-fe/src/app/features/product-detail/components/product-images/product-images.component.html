<div class="product-images">
  <div class="product-images__main">
    <img
      [src]="mainImage"
      alt="Product Image"
      class="product-images__main-img"
      (error)="onImageError($event)"
    />
  </div>

  @if (thumbnails.length > 1) {
    <div class="product-images__thumbnails">
      @for (thumb of thumbnails; track $index) {
        <button
          class="product-images__thumb-btn"
          [class.product-images__thumb-btn--active]="selectedIndex === $index"
          (click)="selectThumbnail($index)"
        >
          <img
            [src]="thumb"
            [alt]="'Product view ' + ($index + 1)"
            class="product-images__thumb-img"
            (error)="onImageError($event)"
          />
        </button>
      }
    </div>
  }

  <!-- Feature Badges -->
  <div class="feature-badges">
    <div class="feature-badge">
      <i class="fas fa-shield-alt"></i>
      <span>2 Year Warranty</span>
    </div>
    <div class="feature-badge">
      <i class="fas fa-shipping-fast"></i>
      <span>Free Shipping</span>
    </div>
    <div class="feature-badge">
      <i class="fas fa-undo-alt"></i>
      <span>30 Day Trial</span>
    </div>
  </div>
</div>
