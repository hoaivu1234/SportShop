<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ titleModal() }}</h2>
      <button class="modal-close" (click)="onCancel()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="form-group">
          <label>Name <span class="required">*</span></label>
          <input
            type="text"
            class="form-input"
            placeholder="e.g. Trail Running"
            formControlName="name"
          />
        </div>

        <div class="form-group">
          <label>Parent Category</label>
          <select class="form-select" formControlName="parentId">
            <option [ngValue]="null">None (Top-level)</option>
            <option *ngFor="let c of filteredCategories()" [ngValue]="c.id">
              {{ c.name }}
            </option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="onCancel()">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" (click)="onSubmit()">
          Confirm
        </button>
      </div>
    </form>
  </div>
</div>
