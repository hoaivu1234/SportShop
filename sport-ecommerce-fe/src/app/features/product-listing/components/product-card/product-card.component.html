<a [routerLink]="['/products', product.id]" class="product-card" [class.product-card--oos]="isOutOfStock">
  <div class="product-card__image-wrap">
    <img
      [src]="imageUrl"
      [alt]="product.name"
      class="product-card__image"
      loading="lazy"
      (error)="onImageError($event)"
    />

    @if (product.badge) {
      <span
        class="product-card__badge"
        [class.badge--sale]="product.badge === 'Sale'"
        [class.badge--new]="product.badge === 'New'"
      >{{ product.badge }}</span>
    }

    @if (isOutOfStock) {
      <span class="product-card__oos-label">Out of Stock</span>
    }

    <button
      class="product-card__wishlist"
      [class.product-card__wishlist--active]="wishlistState.isInWishlist(product.id)"
      [title]="wishlistState.isInWishlist(product.id) ? 'Remove from Wishlist' : 'Add to Wishlist'"
      [attr.aria-label]="wishlistState.isInWishlist(product.id) ? 'Remove from Wishlist' : 'Add to Wishlist'"
      (click)="onToggleWishlist($event)"
    >
      <i [class]="wishlistState.isInWishlist(product.id) ? 'fas fa-heart' : 'far fa-heart'"></i>
    </button>
  </div>

  <div class="product-card__body">
    <p class="product-card__name">{{ product.name }}</p>

    <div class="product-card__footer">
      <div class="product-card__pricing">
        <span class="product-card__price" [class.product-card__price--sale]="product.originalPrice">
          {{ product.price | currency }}
        </span>
        @if (product.originalPrice) {
          <span class="product-card__original-price">{{ product.originalPrice | currency }}</span>
        }
      </div>
      <button class="btn-add-cart" (click)="onAddToCart($event)" [disabled]="isOutOfStock">
        <i class="fas fa-shopping-bag"></i>
        <span>Add</span>
      </button>
    </div>
  </div>
</a>
